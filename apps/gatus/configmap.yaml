apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-config
  namespace: default
data:
  config.yaml: |
    storage:
      type: sqlite
      path: /data/gatus.db

    web:
      port: 8080

    alerting:
      telegram:
        token: "${TELEGRAM_TOKEN}"
        id: "${TELEGRAM_CHAT_ID}"
        default-alert:
          enabled: true
          send-on-resolved: true
          failure-threshold: 2
          success-threshold: 1

    endpoints:
      - name: Matrix
        url: https://matrix.auch.cool/_matrix/federation/v1/version
        interval: 60s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram

      - name: IRC Relay
        url: https://irc.auch.cool
        interval: 60s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram

      - name: Herzmut Games
        url: https://herzmut.org
        interval: 60s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram

      - name: Play Herzmut Games
        url: https://herzmut.org
        interval: 60s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram

      - name: RocketLang
        url: https://rocket-lang.org
        interval: 60s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram

      - name: RocketLang Playground
        url: https://play.rocket-lang.org
        interval: 60s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram

      - name: Auch Cool
        url: https://auch.cool
        interval: 60s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram

      - name: Jellyfin
        url: https://jf.flipez.de
        interval: 60s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram

      - name: Trek
        url: https://trek.auch.cool
        interval: 60s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram

      - name: Rallly
        url: https://rallly.auch.cool
        interval: 60s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram

      - name: SpeziDB
        url: https://spezidb.de/up
        interval: 60s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram

      - name: Hetzner
        group: Hetzner
        url: https://hetzner.com
        interval: 60s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram

      - name: Hetzner Career
        group: Hetzner
        url: https://career.hetzner.com/
        interval: 60s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram

      - name: Hetzner Cloud
        group: Hetzner
        url: https://hetzner-cloud.de
        interval: 60s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram

      - name: Metrics
        group: MVG Observatory
        url: http://data.mvg.auch.cool:9292/
        interval: 60s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram

      - name: Landing Page
        group: MVG Observatory
        url: https://mvg.auch.cool/
        interval: 60s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram

      - name: Grafana
        group: MVG Observatory
        url: https://grafana.mvg.auch.cool/login
        interval: 60s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram

      - name: Clickhouse
        group: MVG Observatory
        url: tcp://hc-200025.auch.cool:9000
        interval: 60s
        conditions:
          - "[CONNECTED] == true"
        alerts:
          - type: telegram

      - name: Metabase
        group: MVG Observatory
        url: https://metabase.auch.cool/api/health
        interval: 60s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram

      - name: Observer Interactive App
        group: MVG Observatory
        url: https://mvg.observer/api/health
        interval: 60s
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram
