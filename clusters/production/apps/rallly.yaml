apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rallly
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Flipez/infra
    targetRevision: main
    path: apps/rallly
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
